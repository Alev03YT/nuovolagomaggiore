<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Info | Nuovo Lago Maggiore Galliate</title>
  <link rel="icon" href="assets/img/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/site.css" />
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <header class="border-b border-slate-800/60 bg-slate-950/75 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
      <a href="index.html" class="flex items-center gap-2">
        <img src="assets/img/logo.svg" class="h-8 w-8" alt="Logo">
        <span class="font-semibold tracking-wide">Nuovo Lago Maggiore Galliate</span>
      </a>
      <nav class="flex items-center gap-5 text-sm text-slate-200">
        <a class="hover:text-white" href="catture.html">Catture</a>
        <a class="text-white" href="info.html">Info</a>
        <a class="rounded-full border border-slate-700 px-3 py-1 hover:border-slate-500" href="admin/">Admin</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-10">
    <h1 class="text-2xl font-semibold">Info e posizione</h1>
    <p class="mt-2 max-w-2xl text-sm text-slate-300">
      Indirizzo: <span class="font-semibold text-slate-200">Nuovo Lago Maggiore, Galliate (NO)</span>
    </p>

    <div class="mt-6 grid gap-4 md:grid-cols-2">
      <div class="rounded-3xl border border-slate-800 bg-slate-900/30 p-5">
        <div class="text-sm font-semibold">Google Maps</div>
        <p class="mt-2 text-sm text-slate-300">Apri posizione o avvia navigazione.</p>
        <div class="mt-4 flex flex-col gap-3">
          <a class="rounded-xl bg-emerald-500 px-4 py-2 text-center text-sm font-semibold text-slate-950 hover:bg-emerald-400"
             target="_blank" rel="noopener"
             href="https://www.google.com/maps/search/?api=1&query=Nuovo%20Lago%20Maggiore%2C%20Galliate%20%28NO%29">Apri Google Maps</a>
          <a class="rounded-xl border border-slate-700 px-4 py-2 text-center text-sm font-semibold hover:border-slate-500"
             target="_blank" rel="noopener"
             href="https://www.google.com/maps/dir/?api=1&destination=Nuovo%20Lago%20Maggiore%2C%20Galliate%20%28NO%29">Avvia navigazione</a>
        </div>
      </div>

      <div class="rounded-3xl border border-slate-800 bg-slate-900/30 p-5">
        <div class="text-sm font-semibold">Galleria</div>
        <p class="mt-2 text-sm text-slate-300">Gestisci le foto dal pannello Admin.</p>
        <div id="gallery" class="mt-4 grid grid-cols-3 gap-2"></div>
      </div>
    </div>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/info.js"></script>
</body>
</html>
